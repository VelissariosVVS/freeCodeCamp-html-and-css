<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>To-Do list</title>
        <meta name="description" content="A list with things i have to do">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div>
            <h1>My to-do list</h1>
        <ul class="todo-list">
            <div>
                <li>
                    <input type="checkbox" id="keyboard">
                    <label for="keyboard">Explore gaming keyboards</label>
                    <ul class="sub-item">
                        <li >
                            <a class="sub-item-link" target="_blank" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-stylized-to-do-list/build-a-stylized-to-do-list#">Keyboard</a>
                        </li>
                    </ul>
                </li>
            </div>
                
            <li>
                <input type="checkbox" id="mouse">
                <label for="mouse">Explore mouse</label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" target="_blank" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-stylized-to-do-list/build-a-stylized-to-do-list#">Mouse</a>
                    </li>
                </ul>
            </li>
            <li>
                <input type="checkbox" id="headphones">
                <label for="headphones">Explore headphones</label>
                <ul class="sub-item">
                    <li>
                        <a class="sub-item-link" target="_blank" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-stylized-to-do-list/build-a-stylized-to-do-list#">Headphones</a>
                    </li>
                </ul>
            </li>
            <li>
                <input type="checkbox" id="proccessor">
                <label for="proccessor">Explore proccessor</label>
                <ul class="sub-item">
                    <li >
                        <a class="sub-item-link" target="_blank" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-stylized-to-do-list/build-a-stylized-to-do-list#">Proccessor</a>
                    </li>
                </ul>
            </li>
        </ul>
        </div>
        
    </body>
</html>
